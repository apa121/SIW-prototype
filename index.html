#1e5bc6', '#3a5a7a': '#1e5bc6',\n    '#eef4fd': '#e7effb',\n    // gold-soft / callouts\n    '#fbf4e4': '#fbf1d5', '#8a6310': '#8a6512'\n  };\n\n  function toHex(tok) {\n    if (tok.charAt(0) === '#') return tok.toLowerCase();\n    var m = tok.match(/^rgb\\((\\d+),\\s*(\\d+),\\s*(\\d+)\\)$/);\n    if (!m) return null; // rgba w/ alpha (shadows, overlays) -> leave alone\n    function h(n) { var s = (+n).toString(16); return s.length === 1 ? '0' + s : s; }\n    return ('#' + h(m[1]) + h(m[2]) + h(m[3])).toLowerCase();\n  }\n\n  function mapHex(str) {\n    if (!str) return str;\n    var out = str.replace(/rgb\\([^)]*\\)|#[0-9a-fA-F]{6}/g, function (tok) {\n      var hex = toHex(tok);\n      if (!hex) return tok;\n      return MAP[hex] || tok;\n    });\n    // fonts (React/CSSOM drops quotes around single-word families like Spectral)\n    out = out.split(\"'Source Sans 3'\").join(\"'Hanken Grotesk'\")\n             .split('\"Source Sans 3\"').join(\"'Hanken Grotesk'\")\n             .split('Source Sans 3').join('Hanken Grotesk')\n             .split(\"'Spectral'\").join(\"'Schibsted Grotesk'\")\n             .split('\"Spectral\"').join(\"'Schibsted Grotesk'\")\n             .split('Spectral').join(\"'Schibsted Grotesk'\");\n    return out;\n  }\n\n  function ensureFonts() {\n    if (document.getElementById('siw-navy-fonts')) return;\n    var l = document.createElement('link');\n    l.id = 'siw-navy-fonts';\n    l.rel = 'stylesheet';\n    l.href = 'https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@500;600;700;800&family=Hanken+Grotesk:wght@400;500;600;700&display=swap';\n    document.head.appendChild(l);\n  }\n\n  var observer = null;\n  function walk(root) {\n    var els = root.querySelectorAll('*');\n    for (var i = 0; i < els.length; i++) {\n      var el = els[i];\n      if (el.closest && el.closest('#siwThemeToggle')) continue;\n      var st = el.getAttribute && el.getAttribute('style');\n      if (st) { var m = mapHex(st); if (m !== st) el.setAttribute('style', m); }\n      var f = el.getAttribute && el.getAttribute('fill');\n      if (f && f.charAt(0) === '#') { var mf = mapHex(f); if (mf !== f) el.setAttribute('fill', mf); }\n      var s = el.getAttribute && el.getAttribute('stroke');\n      if (s && s.charAt(0) === '#') { var ms = mapHex(s); if (ms !== s) el.setAttribute('stroke', ms); }\n    }\n  }\n\n  function applyNavy() {\n    ensureFonts();\n    if (observer) observer.disconnect();\n    walk(document.body);\n    // deepen the sidebar to the spec's navy-900 chrome + gold active bar\n    var aside = document.querySelector('aside');\n    if (aside) {\n      aside.style.background = '#14203A';\n      var links = aside.querySelectorAll('a');\n      for (var i = 0; i < links.length; i++) {\n        var bg = links[i].style.background || links[i].style.backgroundColor;\n        if (bg && /34,\\s*51,\\s*90|#22335a/i.test(bg)) {\n          links[i].style.background = 'rgba(255,255,255,.08)';\n        }\n      }\n    }\n    if (observer) observer.observe(document.body, { childList: true, subtree: true, attributes: true, attributeFilter: ['style', 'fill', 'stroke'] });\n  }\n\n  function buildToggle() {\n    if (document.getElementById('siwThemeToggle')) return;\n    var navy = theme() === 'navy';\n    var wrap = document.createElement('div');\n    wrap.id = 'siwThemeToggle';\n    wrap.style.cssText = 'position:fixed; right:18px; bottom:74px; z-index:150; display:flex; align-items:center; gap:9px; background:#fff; border:1px solid ' + (navy ? '#E7E4DC' : '#EFE9DD') + '; border-radius:999px; padding:5px 7px 5px 13px; box-shadow:0 4px 16px rgba(20,32,58,.13); font-family:' + (navy ? \"'Hanken Grotesk'\" : \"'Source Sans 3'\") + ',system-ui,sans-serif;';\n    var seg = navy ? 'background:#E9B949;color:#1B2A4A;' : 'background:#1F3D32;color:#fff;';\n    var off = 'background:transparent;color:#8A909C;';\n    wrap.innerHTML =\n      '<span style=\"font-size:10.5px; font-weight:700; letter-spacing:.07em; text-transform:up 9999, dateLabel:'—', flags:[], assignee:'Alex', filing:'2025-004478810'},\n    {name:'Sweetwater Labs LLC', entity:'Single-member', suite:'219', stage:'ein', owner:'Nadia Cole', ra:1, addr:1, billing:'ok', days:99999, dateLabel:'—', flags:[], assignee:'Kelsey', filing:'2025-004489023'}\n  ];\n\n  var STAGES = {\n    forming:{label:'Forming', bg:'#EAF1F7', fg:'#2E4A66', dot:'#3A5A7A'},\n    ein:{label:'EIN', bg:'#FBF4E4', fg:'#8A6310', dot:'#C8881A'},\n    mailauth:{label:'Mail auth', bg:'#EAF1F7', fg:'#2E4A66', dot:'#3A5A7A'},\n    bank:{label:'Bank', bg:'#F4F0E8', fg:'#6B6357', dot:'#A8A096'},\n    active:{label:'Active', bg:'#EAF3EC', fg:'#2C6044', dot:'#3E7C5A'},\n    renewal:{label:'Renewal due', bg:'#FBF4E4', fg:'#8A6310', dot:'#C8881A'}\n  };\n  var STAGE_ORDER = {forming:0, ein:1, mailauth:2, bank:3, active:4, renewal:5};\n  var ASSIGNEE_COLOR = {Carmen:'#C8881A', Kelsey:'#2F5B4A', Alex:'#3A5A7A'};\n  var FLAG = {\n    blocked:{label:'Blocked', bg:'#FBF4E4', fg:'#8A6310'},\n    overdue:{label:'Overdue', bg:'#FBF1EF', fg:'#B23A2E'},\n    pastdue:{label:'Past-due', bg:'#FBF1EF', fg:'#B23A2E'}\n  };\n\n  var filters = { stage:'all', status:'all', service:'all', assignee:'all', q:'' };\n  var sort = { key:'default', dir:1 };\n\n  function attention(c){ return c.flags.length ? 1 : 0; }\n\n  function passes(c){\n    if(filters.stage!=='all' && c.stage!==filters.stage) return false;\n    if(filters.status!=='all'){\n      if(filters.status==='needs' && !attention(c)) return false;\n      if(filters.status==='blocked' && c.flags.indexOf('blocked')<0) return false;\n      if(filters.status==='overdue' && c.flags.indexOf('overdue')<0) return false;\n      if(filters.status==='pastdue' && c.flags.indexOf('pastdue')<0) return false;\n    }\n    if(filters.service==='ra' && !c.ra) return false;\n    if(filters.service==='address' && !c.addr) return false;\n    if(filters.assignee!=='all' && c.assignee!==filters.assignee) return false;\n    if(filters.q){\n      var q=filters.q.toLowerCase();\n      var hay=(c.name+' '+c.filing+' '+c.suite+' '+c.owner).toLowerCase();\n      if(hay.indexOf(q)<0) return false;\n    }\n    return true;\n  }\n\n  function cmp(a,b){\n    var k=sort.key, d=sort.dir;\n    if(k==='default'){\n      if(attention(b)-attention(a)) return attention(b)-attention(a);\n      return a.days-b.days;\n    }\n    if(k==='name') return a.name.localeCompare(b.name)*d;\n    if(k==='suite') return (parseInt(a.suite)-parseInt(b.suite))*d;\n    if(k==='stage') return (STAGE_ORDER[a.stage]-STAGE_ORDER[b.stage])*d;\n    if(k==='date') return (a.days-b.days)*d;\n    if(k==='attention') return (attention(a)-attention(b))*d || (a.days-b.days);\n    return 0;\n  }\n\n  function chip(label, bg, fg){ return '<span style=\"font-size:11.5px; font-weight:600; padding:2px 8px; border-radius:6px; background:'+bg+'; color:'+fg+';\">'+label+'</span>'; }\n\n  function rowHtml(c){\n    var s=STAGES[c.stage];\n    var dcol = c.days<0 ? '#B23A2E' : (c.days===99999 ? '#A8A096' : '#1C1A17');\n    var dwt = c.days<0 ? '700' : '600';\n    var svc='';\n    if(c.ra) svc+='<span style=\"font-size:11px; font-weight:700; padding:2px 7px; border-radius:6px; background:#EAF3EC; color:#2C6044;\">RA</span>';\n    if(c.addr) svc+='<span style=\"font-size:11px; font-weight:700; padding:2px 7px; border-radius:6px; background:#EAF1F7; color:#2E4A66;\">Addr</span>';\n    var bdot = c.billing==='pastdue'\n      ? '<span title=\"Past-due billing\" style=\"width:9px; height:9px; border-radius:999px; background:#B23A2E; flex-shrink:0;\"></span>'\n      : '<span title=\"Billing current\" style=\"width:9px; height:9px; border-radius:999px; background:#3E7C5A; flex-shrink:0;\"></span>';\n    var flags = c.flags.length\n      ? c.flags.map(function(f){ var x=FLAG[f]; return '<span style=\"font-size:11.5px; font-weight:600; padding:3px 9px; border-radius:999px; background:'+x.bg+'; color:'+x.fg+';\">'+x.label+'</span>'; }).join(' ')\n      : '<span style=\"font-size:13px; color:#C9C0B0;\">—</span>';\n    var ac=ASSIGNEE_COLOR[c.assignee]||'#6B6357';\n    var rbg = c.flags.indexOf('overdue')>=0 ? '#FDF6F4' : '#fff';\n    return '<a href=\"Company Detail.dc.html\" class=\"co-row\" style=\"display:grid; grid-template-columns:2.3fr 0.7fr 1fr 1.25fr 1.3fr 1.05fr 1.2fr; gap:12px; padding:15px 22px; border-bottom:1px solid #F4F0E8; align-items:center; text-decoration:none; color:inherit; background:'+rbg+'; cursor:pointer;\">'\n      + '<div><div style=\"font-size:14.5px; font-weight:600;\">'+c.name+'</div><div style=\"font-size:12.5px; color:#6B6357;\">'+c.entity+' LLC</div></div>'\n      + '<div style=\"font-size:14px; color:#6B6357; font-variant-numeric:tabular-nums;\">'+c.suite+'</div>'\n      + '<div><span style=\"display:inline-flex; align-items:center; gap:6px; font-size:12.5px; font-weight:600; padding:4px 10px; border-radius:999px; background:'+s.bg+'; color:'+s.fg+';\"><span style=\"width:6px; height:6px; border-radius:999px; background:'+s.dot+';\"></span>'+s.label+'</span></div>'\n      + '<div style=\"display:flex; align-items:center; gap:9px; min-width:0;\"><div style=\"width:26px; height:26px; border-radius:999px; background:'+ac+'; color:#fff; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; flex-shrink:0;\">'+c.owner.split(\" \").map(function(p){return p[0];}).join(\"\")+'</div><span style=\"font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;\">'+c.owner+'</span></div>'\n      + '<div style=\"display:flex; align-items:center; gap:7px;\">'+svc+bdot+'</div>'\n      + '<div style=\"font-size:14px; color:'+dcol+'; font-weight:'+dwt+';\">'+c.dateLabel+'</div>'\n      + '<div style=\"display:flex; flex-wrap:wrap; gap:5px;\">'+flags+'</div>'\n      + '</a>';\n  }\n\n  function render(){\n    var list = DATA.filter(passes).slice().sort(cmp);\n    var body=document.getElementById('coRows');\n    if(body) body.innerHTML = list.length ? list.map(rowHtml).join('') : '<div style=\"padding:40px 22px; text-align:center; color:#A8A096; font-size:14px;\">No companies match these filters.</div>';\n    var pg=document.getElementById('coPaginate'); if(pg) pg.textContent = list.length ? ('Showing 1–'+list.length+' of 620') : 'No results';\n    var rc=document.getElementById('coResultCount'); if(rc) rc.textContent = list.length+(list.length===1?' company':' companies');\n    syncFilterUI();\n    // sort indicators\n    document.querySelectorAll('[data-sort]').forEach(function(h){\n      var on=h.getAttribute('data-sort')===sort.key;\n      var car=h.querySelector('[data-caret]');\n      if(car) car.textContent = on ? (sort.dir>0?' ↑':' ↓') : '';\n      h.style.color = on ? '#1C1A17' : '#6B6357';\n    });\n  }\n\n  function syncFilterUI(){\n    var any=false;\n    document.querySelectorAll('[data-fselect]').forEach(function(sel){\n      var g=sel.getAttribute('data-fselect');\n      var active = filters[g] && filters[g]!=='all';\n      if(active) any=true;\n      if(sel.value!==filters[g]) sel.value=filters[g];\n      sel.style.background = active ? '#1F3D32' : '#fff';\n      sel.style.color = active ? '#fff' : '#1C1A17';\n      sel.style.borderColor = active ? '#1F3D32' : '#E0D8C8';\n    });\n    var clr=document.getElementById('coClear'); if(clr) clr.style.display = (any || filters.q) ? '' : 'none';\n  }\n\n  document.addEventListener('click', function(e){\n    if(e.target.id==='coClear'){\n      filters.stage='all'; filters.status='all'; filters.service='all'; filters.assignee='all'; filters.q='';\n      var sb=document.getElementById('coSearch'); if(sb) sb.value='';\n      syncFilterUI(); render(); return;\n    }\n    var h=e.target.closest && e.target.closest('[data-sort]');\n    if(h){ var k=h.getAttribute('data-sort'); if(sort.key===k){ sort.dir=-sort.dir; } else { sort.key=k; sort.dir=1; } render(); return; }\n  });\n  document.addEventListener('change', function(e){\n    var s=e.target.closest && e.target.closest('[data-fselect]');\n    if(s){ filters[s.getAttribute('data-fselect')]=s.value; syncFilterUI(); render(); }\n  });\n  document.addEventListener('input', function(e){\n    if(e.target.id==='coSearch'){ filters.q=e.target.value; syncFilterUI(); render(); }\n  });\n\n  function boot(){ if(document.getElementById('coRows')){ syncFilterUI(); render(); } else { requestAnimationFrame(boot); } }\n  boot();\n  // Self-heal: if the DC runtime mounts React after we render, it replaces\n  // #coRows with an empty node — re-render whenever the container is empty.\n  setInterval(function(){ var b=document.getElementById('coRows'); if(b && b.children.length===0){ render(); } else { syncFilterUI(); } }, 300);\n})();\n<\/script>\n<script>\n/* Start in Wyoming — Staff workspace theme switcher.\n   Default look = \"Evergreen\" (the original cream/evergreen/amber).\n   Alternate look = \"Navy & Gold\" = the uploaded SIW design-system spec\n   (navy #1B2A4A + gold #E9B949, Schibsted Grotesk + Hanken Grotesk).\n   We never touch disk — the Navy theme is applied at runtime by remapping\n   inline-style hexes + fonts, and reverting is just a reload. */\n(function () {\n  if (window.__siwStaffTheme) return;\n  window.__siwStaffTheme = true;\n\n  var KEY = 'siw_staff_theme';\n  function theme() { try { return localStorage.getItem(KEY) || 'classic'; } catch (e) { return 'classic'; } }\n\n  /* classic hex -> design-system hex (lowercase keys; 6-digit only) */\n  var MAP = {\n    // brand darks (evergreen -> navy)\n    '#1f3d32': '#1b2a4a', '#2f5b4a': '#22335a', '#5c7a6e': '#6e7c97',\n    '#9db3a8': '#9aa6bd', '#cfe0d8': '#aab4c6', '#f4f0e8': '#eef0f4',\n    // accent (amber -> gold)\n    '#ffb825': '#e9b949', '#c8881a': '#b0833a',\n    // ink / text\n    '#1c1a17': '#23314f', '#6b6357': '#5c6470', '#8a4a42': '#b23a1e',\n    '#7c2a22': '#8a2d22', '#a8a096': '#8a909c',\n    // surfaces\n    '#fbf8f2': '#f7f6f2', '#fffdf9': '#ffffff', '#faf9f5': '#f7f6f2',\n    // lines / borders\n    '#efe9dd': '#e7e4dc', '#d9d2c4': '#e0ddd4', '#e4c4bf': '#e6c3b6',\n    '#edd6d1': '#f2d3c8', '#c9bfa8': '#d9d3c6', '#c9c0b0': '#d9d3c6',\n    '#f4f2ec': '#f1efe9',\n    // success (green)\n    '#eaf3ec': '#e4f3ea', '#2c6044': '#15724a', '#3e7c5a': '#1f8a5b',\n    '#ecf1ee': '#e4f3ea', '#f5f8f4': '#edf5ef', '#eef6f0': '#e4f3ea',\n    // warn (red)\n    '#fdf6f4': '#fbeae5', '#b23a2e': '#b23a1e', '#fce9e3': '#fbeae5',\n    // info (blue)\n    '#eaf1f7': '#e7effb', '#2e4a66': '#1e5bc6', '#3a5a7a': '#1e5bc6',\n    '#eef4fd': '#e7effb',\n    // gold-soft / callouts\n    '#fbf4e4': '#fbf1d5', '#8a6310': '#8a6512'\n  };\n\n  function toHex(tok) {\n    if (tok.charAt(0) === '#') return tok.toLowerCase();\n    var m = tok.match(/^rgb\\((\\d+),\\s*(\\d+),\\s*(\\d+)\\)$/);\n    if (!m) return null; // rgba w/ alpha (shadows, overlays) -> leave alone\n    function h(n) { var s = (+n).toString(16); return s.length === 1 ? '0' + s : s; }\n    return ('#' + h(m[1]) + h(m[2]) + h(m[3])).toLowerCase();\n  }\n\n  function mapHex(str) {\n    if (!str) return str;\n    var out = str.replace(/rgb\\([^)]*\\)|#[0-9a-fA-F]{6}/g, function (tok) {\n      var hex = toHex(tok);\n      if (!hex) return tok;\n      return MAP[hex] || tok;\n    });\n    // fonts (React/CSSOM drops quotes around single-word families like Spectral)\n    out = out.split(\"'Source Sans 3'\").join(\"'Hanken Grotesk'\")\n             .split('\"Source Sans 3\"').join(\"'Hanken Grotesk'\")\n             .split('Source Sans 3').join('Hanken Grotesk')\n             .split(\"'Spectral'\").join(\"'Schibsted Grotesk'\")\n             .split('\"Spectral\"').join(\"'Schibsted Grotesk'\")\n             .split('Spectral').join(\"'Schibsted Grotesk'\");\n    return out;\n  }\n\n  function ensureFonts() {\n    if (document.getElementById('siw-navy-fonts')) return;\n    var l = document.createElement('link');\n    l.id = 'siw-navy-fonts';\n    l.rel = 'stylesheet';\n    l.href = 'https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@500;600;700;800&family=Hanken+Grotesk:wght@400;500;600;700&display=swap';\n    document.head.appendChild(l);\n  }\n\n  var observer = null;\n  function walk(root) {\n    var els = root.querySelectorAll('*');\n    for (var i = 0; i < els.length; i++) {\n      var el = els[i];\n      if (el.closest && el.closest('#siwThemeToggle')) continue;\n      var st = el.getAttribute && el.getAttribute('style');\n      if (st) { var m = mapHex(st); if (m !== st) el.setAttribute('style', m); }\n      var f = el.getAttribute && el.getAttribute('fill');\n      if (f && f.charAt(0) === '#') { var mf = mapHex(f); if (mf !== f) el.setAttribute('fill', mf); }\n      var s = el.getAttribute && el.getAttribute('stroke');\n      if (s && s.charAt(0) === '#') { var ms = mapHex(s); if (ms !== s) el.setAttribute('stroke', ms); }\n    }\n  }\n\n  function applyNavy() {\n    ensureFonts();\n    if (observer) observer.disconnect();\n    walk(document.body);\n    // deepen the sidebar to the spec's navy-900 chrome + gold active bar\n    var aside = document.querySelector('aside');\n    if (aside) {\n      aside.style.background = '#14203A';\n      var links = aside.querySelectorAll('a');\n      for (var i = 0; i < links.length; i++) {\n        var bg = links[i].style.background || links[i].style.backgroundColor;\n        if (bg && /34,\\s*51,\\s*90|#22335a/i.test(bg)) {\n          links[i].style.background = 'rgba(255,255,255,.08)';\n        }\n      }\n    }\n    if (observer) observer.observe(document.body, { childList: true, subtree: true, attributes: true, attributeFilter: ['style', 'fill', 'stroke'] });\n  }\n\n  function buildToggle() {\n    if (document.getElementById('siwThemeToggle')) return;\n    var navy = theme() === 'navy';\n    var wrap = document.createElement('div');\n    wrap.id = 'siwThemeToggle';\n    wrap.style.cssText = 'position:fixed; right:18px; bottom:74px; z-index:150; display:flex; align-items:center; gap:9px; background:#fff; border:1px solid ' + (navy ? '#E7E4DC' : '#EFE9DD') + '; bo y:inherit; font-size:15px; color:#1C1A17; background:#FBF8F2; border:1px solid #E0D8C8; border-radius:11px; padding:12px 14px; margin-bottom:18px; outline:none;\" />\n\n      <label style=\"font-size:13px; font-weight:600; color:#6B6357; display:block; margin-bottom:9px;\">Visibility</label>\n      <div style=\"display:flex; flex-direction:column; gap:10px; margin-bottom:22px;\">\n        <button id=\"dsShared\" data-doc-vis=\"shared\" style=\"display:flex; align-items:flex-start; gap:12px; text-align:left; font-family:inherit; padding:14px 16px; border:1.5px solid #1F3D32; border-radius:12px; background:#F5F8F4; cursor:pointer;\">\n          <span id=\"dsSharedDot\" style=\"width:18px; height:18px; border-radius:999px; border:5px solid #1F3D32; flex-shrink:0; margin-top:1px;\"></span>\n          <span><span style=\"font-size:14.5px; font-weight:600; display:block;\">Shared with customer</span><span style=\"font-size:13px; color:#6B6357;\">Publishes to their portal Documents and notifies them by email.</span></span>\n        </button>\n        <button id=\"dsInternal\" data-doc-vis=\"internal\" style=\"display:flex; align-items:flex-start; gap:12px; text-align:left; font-family:inherit; padding:14px 16px; border:1.5px solid #EFE9DD; border-radius:12px; background:#fff; cursor:pointer;\">\n          <span id=\"dsInternalDot\" style=\"width:18px; height:18px; border-radius:999px; border:1.5px solid #C9C0B0; flex-shrink:0; margin-top:1px;\"></span>\n          <span><span style=\"font-size:14.5px; font-weight:600; display:block;\">Internal only</span><span style=\"font-size:13px; color:#6B6357;\">Staff-only. Never shown to the customer.</span></span>\n        </button>\n      </div>\n\n      <div style=\"display:flex; gap:10px; justify-content:flex-end;\">\n        <button data-doc-share-cancel style=\"font-family:inherit; font-size:14.5px; font-weight:600; color:#6B6357; background:#fff; border:1px solid #E0D8C8; border-radius:10px; padding:11px 18px; cursor:pointer;\">Cancel</button>\n        <button id=\"dsPublish\" data-doc-publish style=\"font-family:inherit; font-size:14.5px; font-weight:600; color:#1C1A17; background:#FFB825; border:none; border-radius:10px; padding:11px 22px; cursor:pointer;\">Publish to portal</button>\n      </div>\n    </div>\n  </div>\n\n  <div id=\"coStripeOverlay\" style=\"display:none; position:fixed; inset:0; z-index:200; background:rgba(28,26,23,.5); align-items:center; justify-content:center; padding:20px;\">\n    <div style=\"background:#fff; border-radius:18px; max-width:420px; width:100%; padding:34px; box-shadow:0 20px 60px rgba(0,0,0,.3); text-align:center;\">\n      <div id=\"coStripeSpin\">\n        <div style=\"width:50px; height:50px; margin:0 auto 20px; border:4px solid #EFE9DD; border-top-color:#635BFF; border-radius:999px; animation:coSpin .8s linear infinite;\"></div>\n        <h3 style=\"font-family:'Spectral',serif; font-size:20px; font-weight:600; margin:0 0 8px;\">Opening Stripe billing portal…</h3>\n        <p style=\"font-size:14px; line-height:1.55; color:#6B6357; margin:0;\">Redirecting to the secure payment portal to manage subscriptions and invoices.</p>\n      </div>\n      <div id=\"coStripeDone\" style=\"display:none;\">\n        <div style=\"display:flex; align-items:center; justify-content:center; gap:9px; margin-bottom:16px;\"><div style=\"width:30px; height:30px; border-radius:7px; background:#635BFF; display:flex; align-items:center; justify-content:center;\"><span style=\"color:#fff; font-weight:800; font-size:15px;\">S</span></div><span style=\"font-size:15px; font-weight:700; color:#635BFF;\">Stripe</span></div>\n        <h3 style=\"font-family:'Spectral',serif; font-size:20px; font-weight:600; margin:0 0 8px;\">Stripe billing portal</h3>\n        <p style=\"font-size:14px; line-height:1.55; color:#6B6357; margin:0 0 22px;\">In the real product this is Stripe’s hosted portal to retry the past-due invoice, update the card, or manage plans. <em>(Mocked for this prototype.)</em></p>\n        <button data-stripe-close style=\"font-family:inherit; font-size:15px; font-weight:600; color:#1C1A17; background:#FFB825; border:none; border-radius:11px; padding:11px 24px; cursor:pointer;\">Close</button>\n      </div>\n    </div>\n  </div>\n</div>\n</x-dc>\n</body>\n</html>\n","Work Queue.dc.html":"<!DOCTYPE html>\n<html>\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n\n<style>helmet{display:none!important}x-dc{display:block}html,body{margin:0}</style><script>document.addEventListener(\"click\",function(e){var a=e.target.closest&&e.target.closest(\"a[href]\");if(!a)return;var h=a.getAttribute(\"href\")||\"\";if(/\\.dc\\.html(#|$)/.test(h)){e.preventDefault();if(window.parent&&window.parent.__go)window.parent.__go(h);}},true);<\/script></head>\n<body>\n<x-dc>\n<helmet>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin>\n<link href=\"https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Source+Sans+3:wght@400;500;600;700&display=swap\" rel=\"stylesheet\">\n<style>\n  * { box-sizing: border-box; }\n  body { margin: 0; }\n  ::placeholder { color:#A8A096; }\n</style>\n<script>\n(function(){\n  if(window.__siwWQ) return; window.__siwWQ=true;\n  var filters = { assignee:'all', type:'all', overdue:false, q:'' };\n  function fmtNow(){\n    var d=new Date(2026,10,23,8,42);\n    var mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];\n    var h=d.getHours(), m=d.getMinutes(), ap=h<12?'AM':'PM'; h=h%12; if(h===0)h=12;\n    return mo[d.getMonth()]+' '+d.getDate()+', '+d.getFullYear()+' · '+h+':'+(m<10?'0'+m:m)+' '+ap;\n  }\n  function applyFilters(){\n    var rows=document.querySelectorAll('[data-row]');\n    var shown=0;\n    var q=(filters.q||'').toLowerCase();\n    rows.forEach(function(r){\n      var ok = (filters.assignee==='all'||r.getAttribute('data-assignee')===filters.assignee)\n            && (filters.type==='all'||r.getAttribute('data-type')===filters.type)\n            && (!filters.overdue||r.getAttribute('data-overdue')==='1');\n      if(ok && q){ ok = (r.textContent||'').toLowerCase().indexOf(q)>=0; }\n      r.style.display = ok ? '' : 'none';\n      if(ok) shown++;\n    });\n    var c=document.querySelector('[data-count]'); if(c) c.textContent=shown+(shown===1?' task':' tasks');\n  }\n  function syncFilterUI(){\n    var any=false;\n    document.querySelectorAll('[data-fselect]').forEach(function(sel){\n      var g=sel.getAttribute('data-fselect');\n      var active = filters[g] && filters[g]!=='all';\n      if(active) any=true;\n      if(sel.value!==filters[g]) sel.value=filters[g];\n      sel.style.background = active ? '#1F3D32' : '#fff';\n      sel.style.color = active ? '#fff' : '#1C1A17';\n      sel.style.borderColor = active ? '#1F3D32' : '#E0D8C8';\n    });\n    var ot=document.getElementById('wqOverdue');\n    if(ot){ ot.style.background=filters.overdue?'#B23A2E':'#fff'; ot.style.color=filters.overdue?'#fff':'#B23A2E'; ot.style.borderColor=filters.overdue?'#B23A2E':'#E4C4BF'; if(filters.overdue) any=true; }\n    var clr=document.getElementById('wqClear'); if(clr) clr.style.display=(any||filters.q)?'':'none';\n  }\n  document.addEventListener('change', function(e){\n    var s=e.target.closest && e.target.closest('[data-fselect]');\n    if(s){ filters[s.getAttribute('data-fselect')]=s.value; syncFilterUI(); applyFilters(); }\n  });\n  document.addEventListener('input', function(e){\n    if(e.target.id==='wqSearch'){ filters.q=e.target.value; syncFilterUI(); applyFilters(); }\n  });\n  document.addEventListener('click', function(e){\n    var ot=e.target.closest && e.target.closest('#wqOverdue');\n    if(ot){ filters.overdue=!filters.overdue; syncFilterUI(); applyFilters(); return; }\n    if(e.target.id==='wqClear'){ filters.assignee='all'; filters.type='all'; filters.overdue=false; filters.q=''; var sb=document.getElementById('wqSearch'); if(sb) sb.value=''; syncFilterUI(); applyFilters(); return; }\n    var cb=e.target.closest && e.target.closest('[data-complete]');\n    if(cb){\n      var row=cb.closest('[data-row]');\n      if(row.getAttribute('data-done')==='1') return;\n      row.setAttribute('data-done','1');\n      row.setAttribute('data-overdue','0');\n      row.style.background='#fff';\n      cb.innerHTML='<svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M5 12l4 4 10-10\" stroke=\"#fff\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></svg>';\n      cb.style.background='#3E7C5A'; cb.style.borderColor='#3E7C5A';\n      var st=row.querySelector('[data-status]');\n      if(st) st.innerHTML='<span style=\"width:6px;height:6px;border-radius:999px;background:#3E7C5A;display:inline-block;\"></span>Completed', st.style.background='#EAF3EC', st.style.color='#2C6044';\n      var tn=row.querySelector('[data-title]'); if(tn){ tn.style.color='#6B6357'; tn.style.textDecoration='line-through'; }\n      var ts=row.querySelector('[data-ts]'); if(ts){ ts.style.display=''; ts.textContent='Completed '+fmtNow()+' by Carmen'; }\n      var bb=row.querySelector('[data-blocked]'); if(bb){ bb.innerHTML='<span style=\"color:#A8A096;\">—</span>'; }\n    }\n  });\n  function boot(){ if(document.querySelector('[data-row]')){ syncFilterUI(); applyFilters(); } else { requestAnimationFrame(boot); } }\n  boot();\n  setInterval(syncFilterUI, 400);\n})();\n<\/script>\n<script>\n(function(){\n  if(window.__siwWQNew) return; window.__siwWQNew=true;\n  var MO=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];\n  function openM(){ var m=document.getElementById('wqModal'); if(m){ m.style.display='flex'; var e=document.getElementById('wqErr'); if(e) e.style.display='none'; } }\n  function closeM(){ var m=document.getElementById('wqModal'); if(m) m.style.display='none'; }\n  function fmtDue(v){\n    if(!v) return {label:'\\u2014', overdue:false};\n    var p=v.split('-'); var d=new Date(+p[0],+p[1]-1,+p[2]); var today=new Date(2026,10,23);\n    var label=MO[d.getMonth()]+' '+d.getDate(); var overdue=d<today;\n    if(overdue){ var days=Math.round((today-d)/86400000); if(days>0) label+=' \\u00b7 '+days+'d'; }\n    return {label:label, overdue:overdue};\n  }\n  function avatar(name){\n    var map={Carmen:['C','#C8881A'],Kelsey:['K','#2F5B4A'],Alex:['A','#3A5A7A']};\n    var a=map[name]||[(name||'?').charAt(0),'#6B6357'];\n    return '<div style=\"display:flex; align-items:center; gap:7px;\"><div style=\"width:24px; height:24px; border-radius:999px; background:'+a[1]+'; color:#fff; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700;\">'+a[0]+'</div><span style=\"font-size:13.5px;\">'+name+'</span></div>';\n  }\n  function val(id){ var e=document.getElementById(id); return e?e.value:''; }\n  function create(){\n    var desc=(val('wqfDesc')||'').trim();\n    var due=val('wqfDue');\n    if(desc.length<2 || !due){ var e=document.getElementById('wqErr'); if(e) e.style.display='block'; return; }\n    var company=val('wqfCompany'), type=val('wqfType'), assignee=val('wqfAssignee');\n    var d=fmtDue(due);\n    var dstyle=d.overdue?'color:#B23A2E; font-weight:600;':'color:#6B6357;';\n    var rbg=d.overdue?' background:#FDF6F4;':'';\n    var node=document.createElement('div');\n    node.setAttribute('data-row',''); node.setAttribute('data-type',type); node.setAttribute('data-assignee',assignee); node.setAttribute('data-overdue',d.overdue?'1':'0'); node.setAttribute('data-done','0');\n    node.style.cssText='border-bottom:1px solid #F4F0E8;'+rbg;\n    node.innerHTML='<div style=\"display:grid; grid-template-columns:40px 1.5fr 1.3fr 0.9fr 1fr 1fr 1.2fr; gap:12px; padding:15px 22px; align-items:center;\">'\n      +'<div><button data-complete style=\"width:22px; height:22px; border:1.5px solid #C9C0B0; border-radius:6px; background:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center;\"></button></div>'\n      +'<div><div data-title style=\"font-size:14.5px; font-weight:600;\">'+desc+'</div><div style=\"font-size:12.5px; color:#6B6357;\">'+type+'</div></div>'\n      +'<div style=\"font-size:14px;\">'+company+'</div>'\n      +avatar(assignee)\n      +'<div style=\"font-size:14px; '+dstyle+'\">'+d.label+'</div>'\n      +'<div><span data-status style=\"display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:600; padding:4px 10px; border-radius:999px; background:#F4F0E8; color:#6B6357;\"><span style=\"width:6px; height:6px; border-radius:999px; background:#A8A096;\"></span>Not started</span></div>'\n      +'<div data-blocked style=\"font-size:13px; color:#A8A096;\">\\u2014</div>'\n      +'</div>'\n      +'<div data-ts style=\"display:none; font-size:12px; color:#2C6044; padding:0 22px 12px 74px;\"></div>';\n    var first=document.querySelector('[data-row]');\n    if(first && first.parentNode){ first.parentNode.insertBefore(node, first); }\n    var dd=document.getElementById('wqfDesc'); if(dd) dd.value='';\n    closeM();\n    var sb=document.getElementById('wqSearch'); if(sb) sb.dispatchEvent(new Event('input',{bubbles:true}));\n  }\n  document.addEventListener('click', function(e){\n    if(e.target.closest('#wqNewBtn')){ openM(); return; }\n    if(e.target.closest('[data-wq-cancel]')){ closeM(); return; }\n    if(e.target.id==='wqModal'){ closeM(); return; }\n    if(e.target.closest('[data-wq-create]')){ create(); return; }\n  });\n})();\n<\/script>\n<script>\n/* Start in Wyoming — Staff workspace theme switcher.\n   Default look = \"Evergreen\" (the original cream/evergreen/amber).\n   Alternate look = \"Navy & Gold\" = the uploaded SIW design-system spec\n   (navy #1B2A4A + gold #E9B949, Schibsted Grotesk + Hanken Grotesk).\n   We never touch disk — the Navy theme is applied at runtime by remapping\n   inline-style hexes + fonts, and reverting is just a reload. */\n(function () {\n  if (window.__siwStaffTheme) return;\n  window.__siwStaffTheme = true;\n\n  var KEY = 'siw_staff_theme';\n  function theme() { try { return localStorage.getItem(KEY) || 'classic'; } catch (e) { return 'classic'; } }\n\n  /* classic hex -> design-system hex (lowercase keys; 6-digit only) */\n  var MAP = {\n    // brand darks (evergreen -> navy)\n    '#1f3d32': '#1b2a4a', '#2f5b4a': '#22335a', '#5c7a6e': '#6e7c97',\n    '#9db3a8': '#9aa6bd', '#cfe0d8': '#aab4c6', '#f4f0e8': '#eef0f4',\n    // accent (amber -> gold)\n    '#ffb825': '#e9b949', '#c8881a': '#b0833a',\n    // ink / text\n    '#1c1a17': '#23314f', '#6b6357': '#5c6470', '#8a4a42': '#b23a1e',\n    '#7c2a22': '#8a2d22', '#a8a096': '#8a909c',\n    // surfaces\n    '#fbf8f2': '#f7f6f2', '#fffdf9': '#ffffff', '#faf9f5': '#f7f6f2',\n    // lines / borders\n    '#efe9dd': '#e7e4dc', '#d9d2c4': '#e0ddd4', '#e4c4bf': '#e6c3b6',\n    '#edd6d1': '#f2d3c8', '#c9bfa8': '#d9d3c6', '#c9c0b0': '#d9d3c6',\n    '#f4f2ec': '#f1efe9',\n    // success (green)\n    '#eaf3ec': '#e4f3ea', '#2c6044': '#15724a', '#3e7c5a': '#1f8a5b',\n    '#ecf1ee': '#e4f3ea', '#f5f8f4': '#edf5ef', '#eef6f0': '#e4f3ea',\n    // warn (red)\n    '#fdf6f4': '#fbeae5', '#b23a2e': '#b23a1e', '#fce9e3': '#fbeae5',\n    // info (blue)\n    '#eaf1f7': '#e7effb', '#2e4a66': '#1e5bc6', '#3a5a7a': '#1e5bc6',\n    '#eef4fd': '#e7effb',\n    // gold-soft / callouts\n    '#fbf4e4': '#fbf1d5', '#8a6310': '#8a6512'\n  };\n\n  function toHex(tok) {\n    if (tok.charAt(0) === '#') return tok.toLowerCase();\n    var m = tok.match(/^rgb\\((\\d+),\\s*(\\d+),\\s*(\\d+)\\)$/);\n    if (!m) return null; // rgba w/ alpha (shadows, overlays) -> leave alone\n    function h(n) { var s = (+n).toString(16); return s.length === 1 ? '0' + s : s; }\n    return ('#' + h(m[1]) + h(m[2]) + h(m[3])).toLowerCase();\n  }\n\n  function mapHex(str) {\n    if (!str) return str;\n    var out = str.replace(/rgb\\([^)]*\\)|#[0-9a-fA-F]{6}/g, function (tok) {\n      var hex = toHex(tok);\n      if (!hex) return tok;\n      return MAP[hex] || tok;\n    });\n    // fonts (React/CSSOM drops quotes around single-word families like Spectral)\n    out = out.split(\"'Source Sans 3'\").join(\"'Hanken Grotesk'\")\n             .split('\"Source Sans 3\"').join(\"'Hanken Grotesk'\")\n             .split('Source Sans 3').join('Hanken Grotesk')\n             .split(\"'Spectral'\").join(\"'Schibsted Grotesk'\")\n             .split('\"Spectral\"').join(\"'Schibsted Grotesk'\")\n             .split('Spectral').join(\"'Schibsted Grotesk'\");\n    return out;\n  }\n\n  function ensureFonts() {\n    if (document.getElementById('siw-navy-fonts')) return;\n    var l = document.createElement('link');\n    l.id = 'siw-navy-fonts';\n    l.rel = 'stylesheet';\n    l.href = 'https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@500;600;700;800&family=Hanken+Grotesk:wght@400;500;600;700&display=swap';\n    document.head.appendChild(l);\n  }\n\n  var observer = null;\n  function walk(root) {\n    var els = root.querySelectorAll('*');\n    for (var i = 0; i < els.length; i++) {\n      var el = els[i];\n      if (el.closest && el.closest('#siwThemeToggle')) continue;\n      var st = el.getAttribute && el.getAttribute('style');\n      if (st) { var m = mapHex(st); if (m !== st) el.setAttribute('style', m); }\n      var f = el.getAttribute && el.getAttribute('fill');\n      if (f && f.charAt(0) === '#') { var mf = mapHex(f); if (mf !== f) el.setAttribute('fill', mf); }\n      var s = el.getAttribute && el.getAttribute('stroke');\n      if (s && s.charAt(0) === '#') { var ms = mapHex(s); if (ms !== s) el.setAttribute('stroke', ms); }\n    }\n  }\n\n  function applyNavy() {\n    ensureFonts();\n    if (observer) observer.disconnect();\n    walk(document.body);\n    // deepen the sidebar to the spec's navy-900 chrome + gold active bar\n    var aside = document.querySelector('aside');\n    if (aside) {\n      aside.style.background = '#14203A';\n :1.25; margin-bottom:14px;\">Subject</div>\n          <p id=\"emBody\" style=\"font-size:15px; line-height:1.62; color:#2A2722; margin:0 0 22px;\">Body</p>\n          <a id=\"emCta\" href=\"#\" style=\"display:inline-block; font-family:inherit; font-size:15px; font-weight:600; color:#1C1A17; background:#FFB825; border-radius:11px; padding:12px 24px; text-decoration:none;\">Open portal</a>\n          <div style=\"margin-top:24px; padding-top:16px; border-top:1px solid #F4F0E8; font-size:11.5px; color:#A8A096; line-height:1.5;\">Start in Wyoming · Cheyenne, WY · You’re receiving this because you have an active account. Email is the only way we reach you — there’s no in-app inbox to check.</div>\n        </div>\n      </div>\n      <div style=\"text-align:center; margin-top:14px;\"><button data-email-close style=\"font-family:inherit; font-size:13.5px; font-weight:600; color:#F4F0E8; background:rgba(255,255,255,.14); border:none; border-radius:999px; padding:9px 20px; cursor:pointer;\">Close preview</button></div>\n    </div>\n  </div>\n</x-dc>\n</body>\n</html>\n","Onboarding Review.dc.html":"<!DOCTYPE html>\n<html>\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n\n<style>helmet{display:none!important}x-dc{display:block}html,body{margin:0}</style><script>document.addEventListener(\"click\",function(e){var a=e.target.closest&&e.target.closest(\"a[href]\");if(!a)return;var h=a.getAttribute(\"href\")||\"\";if(/\\.dc\\.html(#|$)/.test(h)){e.preventDefault();if(window.parent&&window.parent.__go)window.parent.__go(h);}},true);<\/script></head>\n<body>\n<x-dc>\n<helmet>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin>\n<link href=\"https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Source+Sans+3:wght@400;500;600;700&display=swap\" rel=\"stylesheet\">\n<style>\n  * { box-sizing: bor ta.value.trim() : 'Document does not meet requirements.';\n      setBadge(item,'Rejected','#FBF1EF','#B23A2E','#B23A2E');\n      if(form) form.style.display='none';\n      if(result){ result.style.display=''; result.style.background='#FDF6F4'; result.style.borderColor='#E4C4BF';\n        result.innerHTML='<div style=\"display:flex;align-items:flex-start;gap:9px;\"><svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" style=\"margin-top:1px;flex-shrink:0;\"><circle cx=\"12\" cy=\"12\" r=\"10\" fill=\"#B23A2E\"/><path d=\"M12 7v6\" stroke=\"#fff\" stroke-width=\"2.2\" stroke-linecap=\"round\"/><circle cx=\"12\" cy=\"16.4\" r=\"1.1\" fill=\"#fff\"/></svg><div><div style=\"font-size:13.5px;font-weight:600;color:#7C2A22;\">Rejected — required action sent to Wei Chen.</div><div style=\"font-size:13px;color:#8A4A42;margin-top:2px;\">Reason: '+reason.replace(/</g,'&lt;')+'</div></div></div>';\n      }\n    }\n  });\n})();\n<\/script>\n<script>\n(function(){\n  if(window.__siwQDemo) return; window.__siwQDemo=true;\n  document.addEventListener('click', function(e){\n    var ap=e.target.closest('[data-act=\"approve\"]');\n    if(ap){ var item=ap.closest('[data-item]'); if(item && /passport/i.test(item.textContent)){ try{ localStorage.setItem('siw_passport_approved','1'); }catch(err){} } return; }\n    var all=e.target.closest('[data-approve-all]');\n    if(all){ try{ localStorage.setItem('siw_passport_approved','1'); }catch(err){} window.parent.__go('Staff Dashboard.dc.html'); return; }\n    var pv=e.target.closest('button'); if(pv && (pv.textContent||'').trim()==='Open in portal view'){ window.parent.__go('Customer Portal.dc.html'); }\n  });\n})();\n<\/script>\n<script>\n/* Start in Wyoming — Staff workspace theme switcher.\n   Default look = \"Evergreen\" (the original cream/evergreen/amber).\n   Alternate look = \"Navy & Gold\" = the uploaded SIW design-system spec\n   (navy #1B2A4A + gold #E9B949, Schibsted Grotesk + Hanken Grotesk).\n   We never touch disk — the Navy theme is applied at runtime by remapping\n   inline-style hexes + fonts, and reverting is just a reload. */\n(function () {\n  if (window.__siwStaffTheme) return;\n  window.__siwStaffTheme = true;\n\n  var KEY = 'siw_staff_theme';\n  function theme() { try { return localStorage.getItem(KEY) || 'classic'; } catch (e) { return 'classic'; } }\n\n  /* classic hex -> design-system hex (lowercase keys; 6-digit only) */\n  var MAP = {\n    // brand darks (evergreen -> navy)\n    '#1f3d32': '#1b2a4a', '#2f5b4a': '#22335a', '#5c7a6e': '#6e7c97',\n    '#9db3a8': '#9aa6bd', '#cfe0d8': '#aab4c6', '#f4f0e8': '#eef0f4',\n    // accent (amber -> gold)\n    '#ffb825': '#e9b949', '#c8881a': '#b0833a',\n    // ink / text\n    '#1c1a17': '#23314f', '#6b6357': '#5c6470', '#8a4a42': '#b23a1e',\n    '#7c2a22': '#8a2d22', '#a8a096': '#8a909c',\n    // surfaces\n    '#fbf8f2': '#f7f6f2', '#fffdf9': '#ffffff', '#faf9f5': '#f7f6f2',\n    // lines / borders\n    '#efe9dd': '#e7e4dc', '#d9d2c4': '#e0ddd4', '#e4c4bf': '#e6c3b6',\n    '#edd6d1': '#f2d3c8', '#c9bfa8': '#d9d3c6', '#c9c0b0': '#d9d3c6',\n    '#f4f2ec': '#f1efe9',\n    // success (green)\n    '#eaf3ec': '#e4f3ea', '#2c6044': '#15724a', '#3e7c5a': '#1f8a5b',\n    '#ecf1ee': '#e4f3ea', '#f5f8f4': '#edf5ef', '#eef6f0': '#e4f3ea',\n    // warn (red)\n    '#fdf6f4': '#fbeae5', '#b23a2e': '#b23a1e', '#fce9e3': '#fbeae5',\n    // info (blue)\n    '#eaf1f7': '#e7effb', '#2e4a66': '#1e5bc6', '#3a5a7a': '#1e5bc6',\n    '#eef4fd': '#e7effb',\n    // gold-soft / callouts\n    '#fbf4e4': '#fbf1d5', '#8a6310': '#8a6512'\n  };\n\n  function toHex(tok) {\n    if (tok.charAt(0) === '#') return tok.toLowerCase();\n    var m = tok.match(/^rgb\\((\\d+),\\s*(\\d+),\\s*(\\d+)\\)$/);\n    if (!m) return null; // rgba w/ alpha (shadows, overlays) -> leave alone\n    function h(n) { var s = (+n).toString(16); return s.length === 1 ? '0' + s : s; }\n    return ('#' + h(m[1]) + h(m[2]) + h(m[3])).toLowerCase();\n  }\n\n  function mapHex(str) {\n    if (!str) return str;\n    var out = str.replace(/rgb\\([^)]*\\)|#[0-9a-fA-F]{6}/g, function (tok) {\n      var hex = toHex(tok);\n      if (!hex) return tok;\n      return MAP[hex] || tok;\n    });\n    // fonts (React/CSSOM drops quotes around single-word families like Spectral)\n    out = out.split(\"'Source Sans 3'\").join(\"'Hanken Grotesk'\")\n             .split('\"Source Sans 3\"').join(\"'Hanken Grotesk'\")\n             .split('Source Sans 3').join('Hanken Grotesk')\n             .split(\"'Spectral'\").join(\"'Schibsted Grotesk'\")\n             .split('\"Spectral\"').join(\"'Schibsted Grotesk'\")\n             .split('Spectral').join(\"'Schibsted Grotesk'\");\n    return out;\n  }\n\n  function ensureFonts() {\n    if (document.getElementById('siw-navy-fonts')) return;\n    var l = document.createElement('link');\n    l.id = 'siw-navy-fonts';\n    l.rel = 'stylesheet';\n    l.href = 'https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@500;600;700;800&family=Hanken+Grotesk:wght@400;500;600;700&display=swap';\n    document.head.appendChild(l);\n  }\n\n  var observer = null;\n  function walk(root) {\n    var els = root.querySelectorAll('*');\n    for (var i = 0; i < els.length; i++) {\n      var el = els[i];\n      if (el.closest && el.closest('#siwThemeToggle')) continue;\n      var st = el.getAttribute && el.getAttribute('style');\n      if (st) { var m = mapHex(st); if (m !== st) el.setAttribute('style', m); }\n      var f = el.getAttribute && el.getAttribute('fill');\n      if (f && f.charAt(0) === '#') { var mf = mapHex(f); if (mf !== f) el.setAttribute('fill', mf); }\n      var s = el.getAttribute && el.getAttribute('stroke');\n      if (s && s.charAt(0) === '#') { var ms = mapHex(s); if (ms !== s) el.setAttribute('stroke', ms); }\n    }\n  }\n\n  function applyNavy() {\n    ensureFonts();\n    if (observer) observer.disconnect();\n    walk(document.body);\n    // deepen the sidebar to the spec's navy-900 chrome + gold active bar\n    var aside = document.querySelector('aside');\n    if (aside) {\n      aside.style.background = '#14203A';\n      var links = aside.querySelectorAll('a');\n      for (var i = 0; i < links.length; i++) {\n        var bg = links[i].style.background || links[i].style.backgroundColor;\n        if (bg && /34,\\s*51,\\s*90|#22335a/i.test(bg)) {\n          links[i].style.background = 'rgba(255,255,255,.08)';\n        }\n      }\n    }\n    if (observer) observer.observe(document.body, { childList: true, subtree: true, attributes: true, attributeFilter: ['style', 'fill', 'stroke'] });\n  }\n\n  function buildToggle() {\n    if (document.getElementById('siwThemeToggle')) return;\n    var navy = theme() === 'navy';\n    var wrap = document.createElement('div');\n    wrap.id = 'siwThemeToggle';\n    wrap.style.cssText = 'position:fixed; right:18px; bottom:74px; z-index:150; display:flex; align-items:center; gap:9px; background:#fff; border:1px solid ' + (navy ? '#E7E4DC' : '#EFE9DD') + '; border-radius:999px; padding:5px 7px 5px 13px; box-shadow:0 4px 16px rgba(20,32,58,.13); font-family:' + (navy ? \"'Hanken Grotesk'\" : \"'Source Sans 3'\") + ',system-ui,sans-serif;';\n    var seg = navy ? 'background:#E9B949;color:#1B2A4A;' : 'background:#1F3D32;color:#fff;';\n    var off = 'background:transparent;color:#8A909C;';\n    wrap.innerHTML =\n      '<span style=\"font-size:10.5px; font-weight:700; letter-spacing:.07em; text-transform:uppercase; color:#8A909C;\">Theme</span>' +\n      '<div style=\"display:flex; gap:2px; background:#F1EFEA; border-radius:999px; padding:2px;\">' +\n        '<button data-theme-set=\"classic\" style=\"font-family:inherit; font-size:12.5px; font-weight:600; border:none; cursor:pointer; padding:6px 13px; border-radius:999px; ' + (navy ? off : seg) + '\">Evergreen</button>' +\n        '<button data-theme-set=\"navy\" style=\"font-family:inherit; font-size:12.5px; font-weight:600; border:none; cursor:pointer; padding:6px 13px; border-radius:999px; ' + (navy ? seg : off) + '\">Navy &amp; Gold</button>' +\n      '</div>';\n    document.body.appendChild(wrap);\n    wrap.addEventListener('click', function (e) {\n      var b = e.target.closest('[data-theme-set]');\n      if (!b) return;\n      var next = b.getAttribute('data-theme-set');\n      if (next === theme()) return;\n      try { localStorage.setItem(KEY, next); } catch (err) {}\n      window.parent.__reload();\n    });\n  }\n\n  function init() {\n    buildToggle();\n    if (theme() === 'navy') {\n      observer = new MutationObserver(function () {\n        if (init._raf) return;\n        init._raf = requestAnimationFrame(function () { init._raf = 0; applyNavy(); });\n      });\n      applyNavy();\n      // a few retries to catch late DC render passes\n      var n = 0, iv = setInterval(function () { applyNavy(); if (++n >= 6) clearInterval(iv); }, 120);\n    }\n  }\n\n  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);\n  else init();\n})();\n\n<\/script>\n</helmet>\n\n<div style=\"display:flex; min-height:100vh; background:#FBF8F2; font-family:'Source Sans 3',system-ui,sans-serif; color:#1C1A17;\">\n\n  <!-- ===== SIDEBAR ===== -->\n  <aside style=\"width:240px; flex-shrink:0; background:#1F3D32; padding:24px 16px; display:flex; flex-direction:column; position:sticky; top:0; height:100vh;\">\n    <div style=\"display:flex; align-items:center; gap:11px; padding:0 8px 24px;\">\n      <div style=\"width:30px; height:30px; border-radius:8px; background:#FFB825; display:flex; align-items:center; justify-content:center;\"><div style=\"width:11px; height:11px; border-radius:3px; background:#1F3D32;\"></div></div>\n      <span style=\"font-family:'Spectral',serif; font-size:15px; font-weight:600; color:#F4F0E8;\">Operations</span>\n    </div>\n    <nav style=\"display:flex; flex-direction:column; gap:3px;\">\n      <a href=\"Staff Dashboard.dc.html\" style=\"display:flex; align-items:center; gap:12px; padding:11px 12px; border-radius: =\"width:6px; height:6px; border-radius:999px; background:#3A5A7A;\"></span>Awaiting review</span>\n              </div>\n              <div data-actions style=\"display:flex; gap:10px; margin-top:16px;\">\n                <button data-act=\"reject\" style=\"font-family:inherit; font-size:13.5px; font-weight:600; color:#B23A2E; background:#fff; border:1px solid #E4C4BF; border-radius:9px; padding:9px 16px; cursor:pointer;\">Reject</button>\n                <button data-act=\"approve\" style=\"font-family:inherit; font-size:13.5px; font-weight:600; color:#fff; background:#1F3D32; border:none; border-radius:9px; padding:9px 16px; cursor:pointer;\">Approve</button>\n              </div>\n              <div data-rejectform style=\"display:none; margin-top:16px; padding-top:16px; border-top:1px solid #F4F0E8;\">\n                <textarea placeholder=\"Reason shown to Wei…\" style=\"width:100%; font-family:inherit; font-size:14px; color:#1C1A17; background:#FBF8F2; border:1px solid #EFE9DD; border-radius:10px; padding:11px 14px; outline:none; resize:vertical; min-height:64px;\"></textarea>\n                <div style=\"display:flex; justify-content:flex-end; gap:10px; margin-top:10px;\">\n                  <button data-act=\"cancel\" style=\"font-family:inherit; font-size:13.5px; font-weight:600; color:#6B6357; background:none; border:none; cursor:pointer;\">Cancel</button>\n                  <button data-act=\"confirm\" style=\"font-family:inherit; font-size:13.5px; font-weight:600; color:#fff; background:#B23A2E; border:none; border-radius:9px; padding:9px 16px; cursor:pointer;\">Reject &amp; notify customer</button>\n                </div>\n              </div>\n              <div data-result style=\"display:none; margin-top:16px; padding:12px 14px; border:1px solid; border-radius:10px;\"></div>\n            </div>\n          </div>\n        </div>\n      </div>\n\n      <!-- footer action -->\n      <div style=\"margin-top:30px; padding:20px 24px; background:#fff; border:1px solid #EFE9DD; border-radius:14px; display:flex; align-items:center; gap:16px; flex-wrap:wrap;\">\n        <div style=\"flex:1; min-width:240px;\"><div style=\"font-size:14.5px; font-weight:600;\">Approve all remaining and advance onboarding</div><div style=\"font-size:13px; color:#6B6357;\">Promotes every approved item to the company record and moves Teton Peak to Forming.</div></div>\n        <button data-approve-all id=\"approveAll\" style=\"font-family:inherit; font-size:14.5px; font-weight:600; color:#1C1A17; background:#FFB825; border:none; border-radius:10px; padding:12px 22px; cursor:pointer;\">Approve all &amp; advance</button>\n      </div>\n\n    </main>\n  </div>\n</div>\n</x-dc>\n</body>\n</html>\n","Customer Invite.dc.html":"<!DOCTYPE html>\n<html>\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n\n<style>helmet{display:none!important}x-dc{display:block}html,body{margin:0}</style><script>document.addEventListener(\"click\",function(e){var a=e.target.closest&&e.target.closest(\"a[href]\");if(!a)return;var h=a.getAttribute(\"href\")||\"\";if(/\\.dc\\.html(#|$)/.test(h)){e.preventDefault();if(window.parent&&window.parent.__go)window.parent.__go(h);}},true);<\/script></head>\n<body>\n<x-dc>\n<helmet>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin>\n<link href=\"https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Source+Sans+3:wght@400;500;600;700&display=swap\" rel=\"stylesheet\">\n<style>\n  * { box-sizing: border-box; }\n  body { margin: 0; }\n  @keyframes siwFade { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }\n  input:focus { outline:none; border-color:#1F3D32 !important; }\n</style>\n<script>\n(function(){\n  if(window.__siwInvite) return; window.__siwInvite=true;\n  function show(id){ var e=document.getElementById(id); if(e){ e.style.display=''; e.style.animation='siwFade .5s ease both'; } }\n  function hide(id){ var e=document.getElementById(id); if(e) e.style.display='none'; }\n  function go(step){\n    hide('emailStep'); hide('passwordStep'); hide('doneStep');\n    show(step); window.scrollTo(0,0);\n  }\n  function validate(){\n    var p=document.getElementById('pw'), c=document.getElementById('pwc');\n    if(!p||!c) return;\n    var v=p.value, cv=c.value;\n    var score=0; if(v.length>=8) score++; if(/[0-9]/.test(v)) score++; if(/[^A-Za-z0-9]/.test(v)) score++;\n    var bars=document.querySelectorAll('[data-pwbar]');\n    var colors=['#E4C4BF','#EAD9A8','#CFE6D6'];\n    var fills=['#B23A2E','#C8881A','#3E7C5A'];\n    bars.forEach(function(b,i){ b.style.background = (v.length>0 && i<score) ? fills[Math.min(score-1,2)] : '#EFE9DD'; });\n    var lbl=document.getElementById('pwlabel');\n    if(lbl){ if(!v){ lbl.textContent='At least 8 characters'; lbl.style.color='#A8A096'; }\n      else { lbl.textContent=['Too short','Good','Strong'][Math.min(score-1,2)]||'Too short'; lbl.style.color=fills[Math.min(score-1,2)]||'#B23A2E'; } }\n    var matchNote=document.getElementById('matchNote');\n    var ok = v.length>=8 && v===cv;\n    if(matchNote){ if(cv.length===0){ matchNote.style.display='none'; }\n      else if(v===cv){ matchNote.style.display=''; matchNote.style.color='#2C6044'; matchNote.textContent='Passwords match'; }\n      else { matchNote.style.display=''; matchNote.style.color='#B23A2E'; matchNote.textContent='Passwords don\\u2019t match yet'; } }\n    var btn=document.getElementById('createBtn');\n    if(btn){ btn.style.opacity = ok?'1':'.5'; btn.style.cursor = ok?'pointer':'not-allowed'; btn.setAttribute('data-ok', ok?'1':'0'); }\n  }\n  document.addEventListener('input', function(e){ if(e.target.id==='pw'||e.target.id==='pwc') validate(); });\n  document.addEventListener('click', function(e){\n    var t=e.target;\n    if(t.closest('[data-open-portal]')){ go('passwordStep'); return; }\n    if(t.closest('#createBtn')){ var b=document.getElementById('createBtn'); if(b.getAttribute('data-ok')==='1') go('doneStep'); return; }\n    var rev=t.closest('[data-reveal]'); if(rev){ var f=document.getElementById(rev.getAttribute('data-reveal')); if(f){ f.type = f.type==='password'?'text':'password'; rev.textContent = f.type==='password'?'Show':'Hide'; } return; }\n  });\n})();\n<\/script>\n</helmet>\n\n<div style=\"min-height:100vh; background:#FBF8F2; font-family:'Source Sans 3',system-ui,sans-serif; color:#1C1A17;\">\n\n  <!-- ================= STEP 1 · INVITE EMAIL ================= -->\n  <div id=\"emailStep\" style=\"min-height:100vh; padding:clamp(24px,5vw,56px) clamp(16px,5vw,40px) 110px;\">\n    <div style=\"max-width:660px; margin:0 auto;\">\n      <div style=\"text-align:center; font-size:12px; font-weight:600; letter-spacing:.12em; text-transform:uppercase; color:#A8A096; margin-bottom:18px;\">An email arrives in Wei’s inbox</div>\n\n      <div style=\"background:#fff; border:1px solid #EFE9DD; border-radius:18px; overflow:hidden; box-shadow:0 6px 30px rgba(28,26,23,.07);\">\n        <!-- email header -->\n        <div style=\"padding:clamp(20px,4vw,28px) clamp(20px,4vw,32px); border-bottom:1px solid #F4F0E8;\">\n          <h1 style=\"font-family:'Spectral',serif; font-size:clamp(21px,3.4vw,26px); font-weight:600; line-height:1.25; margin:0 0 18px; letter-spacing:-0.005em;\">Your Wyoming LLC — your private portal is ready</h1>\n          <div style=\"display:flex; align-items:center; gap:13px;\">\n            <div style=\"width:44px; height:44px; border-radius:999px; background:#C8881A; color:#fff; display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:700; flex-shrink:0;\">C</div>\n            <div style=\"min-width:0; flex:1;\">\n              <div style=\"font-size:15px; font-weight:600;\">Carmen Ortiz <span style=\"font-weight:400; color:#6B6357;\">· Start in Wyoming</span></div>\n              <div style=\"font-size:13px; color:#6B6357; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;\">to Wei Chen &lt;wei.chen@tetonpeak.co&gt;</div>\n            </div>\n            <div style=\"font-size:12.5px; color:#A8A096; white-space:nowrap;\">9:14 AM</div>\n          </div>\n        </div>\n\n        <!-- email body -->\n        <div style=\"padding:clamp(22px,4vw,32px); font-size:16px; line-height:1.72; color:#2A2722;\">\n          <p style=\"margin:0 0 18px;\">Hi Wei,</p>\n          <p style=\"margin:0 0 18px;\">I’ve started work on your Wyoming LLC — <strong style=\"font-weight:600;\">Teton Peak Consulting</strong>. I’ll be your point of contact from here through formation, so you’ll always know exactly who’s looking after your filing.</p>\n          <p style=\"margin:0 0 18px;\">I’ve set up a private, secure portal where we’ll handle everything together — the few documents I’ll need from you, anything that needs your signature, and your mail and filings as they arrive. It’s the safe place for sensitive items, so nothing personal ever has to travel by email again.</p>\n          <p style=\"margin:0 0 26px;\">Whenever you’re ready, set your password and take a look:</p>\n\n          <div style=\"text-align:center; margin:0 0 26px;\">\n            <button data-open-portal style=\"font-family:inherit; font-size:16px; font-weight:600; color:#1C1A17; background:#FFB825; border:none; border-radius:11px; padding:15px 34px; cursor:pointer; box-shadow:0 2px 6px rgba(200,136,26,.25);\">Open your private portal</button>\n            <div style=\"display:flex; align-items:center; justify-content:center; gap:7px; margin-top:14px; font-size:13px; color:#A8A096;\">\n              <svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\"><rect x=\"5\" y=\"11\" width=\"14\" height=\"9\" rx=\"2\" stroke=\"#A8A096\" stroke-width=\"1.8\"/><path d=\"M8 11V8a4 4 0 018 0v3\" stroke=\"#A8A096\" stroke-width=\"1.8\"/></svg>\n              Private link, just for you · expires in 7 days\n            </div>\n          </div>\n\n          <p style=\"margin:0 0 18px;\">There’s no rush, and nothing here is public. If anything looks unfamiliar or you have a question, simply reply to this email — it comes straight to me.</p>\n          <p style=\"margin:0 0 6px;\">Warmly,</p>\n          <div style=\"margin-top:10px;\">\n            <div style=\"font-family:'Spectral',serif; font-size:19px; color:#1F3D32;\">Carmen Ortiz</div>\n            <div style=\"font-size:13.5px; color:#6B6357; line-height:1.5;\">Operations · Start in Wyoming<br>Cheyenne, Wyoming</div>\n          </div>\n        </div>\n      </div>\n    </div>\n  </div>\n\n  <!-- ================= STEP 2 · SET PASSWORD ================= -->\n  <div id=\"passwordStep\" style=\"display:none; min-height:100vh; padding:clamp(24px,5vw,64px) clamp(16px,5vw,40px) 110px;\">\n    <div style=\"max-width:480px; margin:0 auto;\">\n      <!-- brand -->\n      <div style=\"display:flex; align-items:center; gap:12px; justify-content:center; margin-bottom:34px;\">\n        <div style=\"width:34px; height:34px; border-radius:9px; background:#1F3D32; display:flex; align-items:center; justify-content:center;\"><div style=\"width:13px; height:13px; border-radius:3px; background:#FFB825;\"></div></div>\n        <span style=\"font-family:'Spectral',serif; font-size:15px; font-weight:600; letter-spacing:.04em; color:#1F3D32; text-transform:uppercase;\">Start in Wyoming</span>\n      </div>\n\n      <div style=\"background:#fff; border:1px solid #EFE9DD; border-radius:18px; padding:clamp(26px,5vw,40px); box-shadow:0 6px 30px rgba(28,26,23,.06);\">\n        <div style=\"font-size:12px; font-weight:600; letter-spacing:.12em; text-transform:uppercase; color:#C8881A; margin-bottom:12px;\">Your private portal</div>\n        <h1 style=\"font-family:'Spectral',serif; font-size:clamp(28px,5vw,34px); font-weight:600; line-height:1.12; margin:0 0 12px; letter-spacing:-0.01em;\">Welcome, Wei.</h1>\n        <p sty
